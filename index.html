function Reveal({ children, delay = 0 }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold: 0.15 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? "translateY(0)" : "translateY(18px)",
      transition: `opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s`,
    }}>
      {children}
    </div>
  );
}

function Photo({ src, alt, className }) {
  const [failed, setFailed] = useState(false);
  if (failed) {
    return <div className={className} style={{ background: `linear-gradient(135deg, ${PALETTE.panelSoft}, ${PALETTE.pine})` }} />;
  }
  return <img src={src} alt={alt} onError={() => setFailed(true)} className={className} style={{ objectFit: "cover" }} />;
}

          {sent ? (
            <div className="flex flex-col items-center gap-3 rounded-2xl px-8 py-12 text-center" style={{ background: PALETTE.panel, border: `1px solid ${PALETTE.hairline}` }}>
              <Icon name="check" size={22} style={{ color: PALETTE.amber }} />
              <p style={{ color: PALETTE.sand }}>Спасибо! Ваш почтовый клиент открывается для отправки.</p>
              <p className="text-xs" style={{ color: PALETTE.sandMuted }}>Если письмо не открылось автоматически — напишите нам в Instagram.</p>
            </div>
          ) : (
            <form onSubmit={handleSubmit} className="space-y-4 rounded-2xl p-8 md:p-10" style={{ background: PALETTE.panel, border: `1px solid ${PALETTE.hairline}` }}>
              <input required value={form.name} onChange={(e) => handleChange("name", e.target.value)} placeholder="Ваше имя"
                className="w-full rounded-lg px-4 py-3 text-sm outline-none" style={{ background: PALETTE.base, border: `1px solid ${PALETTE.hairline}`, color: PALETTE.sand }} />
              <div className="grid grid-cols-2 gap-4">
                <input value={form.dates} onChange={(e) => handleChange("dates", e.target.value)} placeholder="Даты"
                  className="w-full rounded-lg px-4 py-3 text-sm outline-none" style={{ background: PALETTE.base, border: `1px solid ${PALETTE.hairline}`, color: PALETTE.sand }} />
                <input value={form.guests} onChange={(e) => handleChange("guests", e.target.value)} placeholder="Гостей (до 7)"
                  className="w-full rounded-lg px-4 py-3 text-sm outline-none" style={{ background: PALETTE.base, border: `1px solid ${PALETTE.hairline}`, color: PALETTE.sand }} />
              </div>
              <textarea value={form.message} onChange={(e) => handleChange("message", e.target.value)} placeholder="Расскажите, для какого случая ищете виллу" rows="4"
                className="w-full resize-none rounded-lg px-4 py-3 text-sm outline-none" style={{ background: PALETTE.base, border: `1px solid ${PALETTE.hairline}`, color: PALETTE.sand }} />
              <button type="submit" className="flex w-full items-center justify-center gap-2 rounded-full py-3.5 text-sm font-medium transition-transform hover:scale-[1.01]" style={{ background: PALETTE.amber, color: PALETTE.base }}>
                <Icon name="send" size={15} /> Отправить заявку
              </button>
              <a href={INSTAGRAM_LINK} target="_blank" rel="noopener noreferrer" className="flex w-full items-center justify-center gap-2 rounded-full py-3.5 text-sm transition-colors hover:bg-white/5" style={{ border: `1px solid ${PALETTE.hairline}`, color: PALETTE.sand }}>
                <Icon name="instagram" size={15} /> Написать в Instagram
              </a>
            </form>
          )}
        </div>
      </section>

      <footer className="flex flex-col items-center gap-3 px-6 py-10 pb-24 text-center md:flex-row md:justify-between md:px-12 md:pb-10">
        <span className="text-xs tracking-[0.2em]" style={{ fontFamily: "'JetBrains Mono', monospace", color: PALETTE.sandMuted }}>TALGAR VILLA · ТАЛГАР, АЛМАТИНСКАЯ ОБЛАСТЬ</span>
        <a href={INSTAGRAM_LINK} target="_blank" rel="noopener noreferrer" className="flex items-center gap-2 text-xs" style={{ color: PALETTE.sandMuted }}>
          <Icon name="instagram" size={13} /> @talgar_villa
        </a>
      </footer>

      <div className="fixed bottom-0 left-0 right-0 z-40 flex gap-2 p-3 md:hidden" style={{ background: PALETTE.panel, borderTop: `1px solid ${PALETTE.hairline}` }}>
        <a href="#contact" className="flex-1 rounded-full py-3 text-center text-sm font-medium" style={{ background: PALETTE.amber, color: PALETTE.base }}>Узнать о датах</a>
        <a href={INSTAGRAM_LINK} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center rounded-full px-4" style={{ border: `1px solid ${PALETTE.hairline}`, color: PALETTE.sand }}>
          <Icon name="instagram" size={17} />
        </a>
      </div>

      {lightbox && (
        <div onClick={() => setLightbox(null)} className="fixed inset-0 z-50 flex items-center justify-center p-6" style={{ background: "rgba(10,12,15,0.94)" }}>
          <button onClick={() => setLightbox(null)} className="absolute right-5 top-5 rounded-full p-2" style={{ border: `1px solid ${PALETTE.hairline}`, color: PALETTE.sand }}>
            <Icon name="x" size={18} />
          </button>
          <img src={lightbox} alt="" className="max-h-full max-w-full rounded-lg" style={{ objectFit: "contain" }} />
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TalgarVilla />);
</script>
</body>
</html>
